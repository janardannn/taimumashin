AWSTemplateFormatVersion: "2010-09-09"
Description: >
  taimumashin — One-click deployment of user-side storage infrastructure.
  Creates an S3 bucket with Glacier lifecycle, a Lambda for restore
  notifications, an IAM OIDC provider and role for browser-based S3 access.

Parameters:
  TaimumashinIssuerUrl:
    Type: String
    AllowedPattern: "^https?://.+"
    ConstraintDescription: Must be an HTTP or HTTPS URL.
    Description: >
      The taimumashin instance URL (OIDC issuer). This is used to establish
      trust so your browser can get temporary S3 credentials. The platform
      server never gets access to your bucket — only your browser does.

  WebhookUrl:
    Type: String
    AllowedPattern: "^https?://.+"
    ConstraintDescription: Must be an HTTP or HTTPS URL.
    Description: >
      Your taimumashin instance URL for webhook callbacks.
      The Lambda function POSTs restore-complete notifications here.

  LifecycleDays:
    Type: Number
    Default: 7
    MinValue: 0
    MaxValue: 365
    Description: >
      Number of days after upload before objects under the originals/ prefix
      are transitioned to Glacier Deep Archive. Set to 0 for immediate transition. Default is 7.

Resources:
  MediaBucket:
    Type: AWS::S3::Bucket
    DependsOn: LambdaInvokePermission
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: ArchiveOriginals
            Status: Enabled
            Prefix: "originals/"
            Transitions:
              - StorageClass: GLACIER
                TransitionInDays: !Ref LifecycleDays
      CorsConfiguration:
        CorsRules:
          - AllowedOrigins:
              - !Ref TaimumashinIssuerUrl
            AllowedMethods:
              - PUT
              - GET
              - HEAD
              - DELETE
              - POST
            AllowedHeaders:
              - "*"
            MaxAge: 3600
            ExposedHeaders:
              - ETag
              - x-amz-request-id
              - x-amz-restore
      NotificationConfiguration:
        LambdaConfigurations:
          - Event: "s3:ObjectRestore:Completed"
            Function: !GetAtt RestoreNotifyLambda.Arn
      Tags:
        - Key: Project
          Value: taimumashin

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "taimumashin-lambda-${AWS::StackName}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: "sts:AssumeRole"
      Policies:
        - PolicyName: LambdaAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - "s3:GetObject"
                  - "s3:HeadObject"
                Resource: "arn:aws:s3:::*"
              - Effect: Allow
                Action:
                  - "logs:CreateLogGroup"
                  - "logs:CreateLogStream"
                  - "logs:PutLogEvents"
                Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/*"

  RestoreNotifyLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "taimumashin-notify-${AWS::StackName}"
      Description: >
        POSTs restore-complete webhook when S3 Glacier restores finish.
        Email notifications are handled by the app server.
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      MemorySize: 256
      Timeout: 60
      Environment:
        Variables:
          WEBHOOK_URL: !Ref WebhookUrl
      Code:
        ZipFile: |
          """
          taimumashin restore notifier.

          Handles s3:ObjectRestore:Completed events — POSTs to the app
          webhook so the server can update the DB and send email.
          """

          import json
          import os
          import urllib.request
          import urllib.parse
          import logging
          from pathlib import Path

          import boto3

          logger = logging.getLogger()
          logger.setLevel(logging.INFO)

          s3 = boto3.client("s3")

          WEBHOOK_URL = os.environ["WEBHOOK_URL"]


          def handler(event, context):
              for record in event.get("Records", []):
                  event_name = record.get("eventName", "")
                  bucket = record["s3"]["bucket"]["name"]
                  key = urllib.parse.unquote_plus(record["s3"]["object"]["key"])

                  logger.info("Event: %s | Bucket: %s | Key: %s", event_name, bucket, key)

                  if "ObjectRestore:Completed" in event_name:
                      handle_restore_complete(bucket, key)
                  else:
                      logger.warning("Unhandled event type: %s", event_name)


          def handle_restore_complete(bucket, key):
              try:
                  head = s3.head_object(Bucket=bucket, Key=key)
                  metadata = head.get("Metadata", {})
                  user_id = metadata.get("user-id", "unknown")
                  folder_path = metadata.get("folder-path", key)
                  restore_header = head.get("Restore", "")
                  expires_at = ""
                  if 'expiry-date="' in restore_header:
                      expires_at = restore_header.split('expiry-date="')[1].split('"')[0]
              except Exception as exc:
                  logger.error("Failed to head object %s/%s: %s", bucket, key, exc)
                  user_id = "unknown"
                  folder_path = key
                  expires_at = ""

              payload = json.dumps({
                  "event": "restore.completed",
                  "bucket": bucket,
                  "key": key,
                  "userId": user_id,
                  "folderPath": folder_path,
                  "expiresAt": expires_at,
                  "region": os.environ.get("AWS_REGION", ""),
              }).encode("utf-8")

              req = urllib.request.Request(
                  WEBHOOK_URL, data=payload,
                  headers={"Content-Type": "application/json"},
                  method="POST",
              )
              try:
                  with urllib.request.urlopen(req, timeout=15) as resp:
                      logger.info("Webhook response: %d %s", resp.status,
                          resp.read(256).decode("utf-8", errors="replace"))
              except Exception as exc:
                  logger.error("Webhook POST failed: %s", exc)

  LambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt RestoreNotifyLambda.Arn
      Action: "lambda:InvokeFunction"
      Principal: s3.amazonaws.com
      SourceAccount: !Ref "AWS::AccountId"

  RestoreNotifyLambdaLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${RestoreNotifyLambda}"
      RetentionInDays: 30

  OidcProvider:
    Type: AWS::IAM::OIDCProvider
    Properties:
      Url: !Ref TaimumashinIssuerUrl
      ClientIdList:
        - "sts.amazonaws.com"
      ThumbprintList:
        - "0000000000000000000000000000000000000000"

  TaimumashinBrowserRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "taimumashin-access-${AWS::StackName}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: !GetAtt OidcProvider.Arn
            Action: "sts:AssumeRoleWithWebIdentity"
      MaxSessionDuration: 3600
      Policies:
        - PolicyName: TaimumashinBucketAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - "s3:GetObject"
                  - "s3:PutObject"
                  - "s3:DeleteObject"
                  - "s3:HeadObject"
                  - "s3:RestoreObject"
                Resource: !Sub "arn:aws:s3:::${MediaBucket}/*"
              - Effect: Allow
                Action:
                  - "s3:ListBucket"
                Resource: !Sub "arn:aws:s3:::${MediaBucket}"

Outputs:
  RoleArn:
    Description: ARN of the OIDC IAM role for browser-based S3 access.
    Value: !GetAtt TaimumashinBrowserRole.Arn

  BucketName:
    Description: Name of the S3 bucket for your media.
    Value: !Ref MediaBucket

  Region:
    Description: AWS region where this stack is deployed.
    Value: !Ref "AWS::Region"

  LambdaFunctionArn:
    Description: ARN of the restore notification Lambda (for reference).
    Value: !GetAtt RestoreNotifyLambda.Arn

  BucketArn:
    Description: ARN of the media S3 bucket (for reference).
    Value: !GetAtt MediaBucket.Arn
